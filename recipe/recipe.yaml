context:
  version: "14.3.0"

package:
  name: syncpack
  version: ${{ version }}

source:
  url: https://github.com/JamieMason/syncpack/archive/refs/tags/${{ version }}.tar.gz
  sha256: cbe64fe384beda05813323fba0f9829047a7c96fccf8e73d5f48b17ad90b03ee

build:
  number: 0
  skip: ppc64le

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - syncpack --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Consistent dependency versions in large JavaScript Monorepos.
  homepage: https://github.com/JamieMason/syncpack
  repository: https://github.com/JamieMason/syncpack

extra:
  recipe-maintainers:
    - danielnachun
