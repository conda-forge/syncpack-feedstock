context:
  version: "14.3.1"

package:
  name: syncpack
  version: ${{ version }}

source:
  url: https://github.com/JamieMason/syncpack/archive/refs/tags/${{ version }}.tar.gz
  sha256: aa1dbe9a39f0602b31310ba900c4eb5626fc21a5cdda1fef006ab1e80a470764

build:
  number: 0
  skip: ppc64le

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - syncpack --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Consistent dependency versions in large JavaScript Monorepos.
  homepage: https://github.com/JamieMason/syncpack
  repository: https://github.com/JamieMason/syncpack

extra:
  recipe-maintainers:
    - danielnachun
