context:
  version: "14.1.0"

package:
  name: syncpack
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/syncpack/-/syncpack-${{ version }}.tgz
  sha256: 95dcbfcdcc593b3e7704450e8c4a33d5db5253936cc0c6110e28acda828cd353

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - syncpack --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Consistent dependency versions in large JavaScript Monorepos.
  homepage: https://github.com/JamieMason/syncpack
  repository: https://github.com/JamieMason/syncpack

extra:
  recipe-maintainers:
    - danielnachun
