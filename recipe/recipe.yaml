context:
  version: "14.2.0"

package:
  name: syncpack
  version: ${{ version }}

source:
  url: https://github.com/JamieMason/syncpack/archive/refs/tags/${{ version }}.tar.gz
  sha256: f789157df99a7cc9b99a061d40de2999f6cf6ab2e7920140f983c18d27034c89

build:
  number: 0
  skip: ppc64le

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - syncpack --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Consistent dependency versions in large JavaScript Monorepos.
  homepage: https://github.com/JamieMason/syncpack
  repository: https://github.com/JamieMason/syncpack

extra:
  recipe-maintainers:
    - danielnachun
