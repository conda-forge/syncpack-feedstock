context:
  version: "14.1.0"

package:
  name: syncpack
  version: ${{ version }}

source:
  url: https://github.com/JamieMason/syncpack/archive/refs/tags/${{ version }}.tar.gz
  sha256: 0bea3ddf080ec4d42243cdce7c136be118f2e1dfee87fe3073fc885f1b550ade

build:
  number: 0
  skip: ppc64le

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - syncpack --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Consistent dependency versions in large JavaScript Monorepos.
  homepage: https://github.com/JamieMason/syncpack
  repository: https://github.com/JamieMason/syncpack

extra:
  recipe-maintainers:
    - danielnachun
